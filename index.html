<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GAN Cube Input</title>

<style>
body{
    font-family:sans-serif;
    margin:30px;
}

#buttons{
    display:grid;
    grid-template-columns:repeat(4,90px);
    gap:10px;
    margin-top:20px;
}

button{
    font-size:22px;
    height:60px;
}

#connect{
    width:180px;
    height:45px;
    font-size:18px;
}

#current{
    margin-top:30px;
    font-size:30px;
    font-weight:bold;
    color:#0066cc;
}
</style>
</head>

<body>

<button id="connect">接続</button>

<div id="buttons"></div>

<div id="current">-</div>

<script type="module">

import { connectSmartPuzzle }
from "https://cdn.cubing.net/v0/js/cubing/bluetooth";

const moves = [
    "U","U'",
    "R","R'",
    "F","F'",
    "D","D'",
    "L","L'",
    "B","B'"
];

const buttons = document.getElementById("buttons");
const current = document.getElementById("current");

function handleMove(move){

    console.log(move);

    current.textContent = move;

    if(chords[move]){
        playChord(chords[move]);
    }

}

const audio = new AudioContext();

function playChord(freqs){

    for(const freq of freqs){

        const osc = audio.createOscillator();
        const gain = audio.createGain();

        osc.frequency.value = freq;
        osc.type = "sine";

        gain.gain.value = 0.15;

        osc.connect(gain);
        gain.connect(audio.destination);

        osc.start();

        gain.gain.exponentialRampToValueAtTime(
            0.001,
            audio.currentTime + 0.8
        );

        osc.stop(audio.currentTime + 0.8);
    }

}


const chords = {

    "U":[261.63,329.63,392.00],      // C
    "U'":[293.66,349.23,440.00],     // Dm

    "R":[392.00,493.88,587.33],      // G
    "R'":[440.00,523.25,659.25],     // Am

    "F":[349.23,440.00,523.25],      // F
    "F'":[329.63,392.00,493.88],

    "D":[293.66,369.99,440.00],
    "D'":[246.94,293.66,369.99],

    "L":[220.00,277.18,329.63],
    "L'":[174.61,220.00,261.63],

    "B":[196.00,246.94,293.66],
    "B'":[164.81,207.65,246.94]

};


for(const move of moves){

    const button = document.createElement("button");

    button.textContent = move;

    button.onclick = ()=>handleMove(move);

    buttons.appendChild(button);

}

document.getElementById("connect").onclick = async ()=>{

    const puzzle = await connectSmartPuzzle();

    document.getElementById("connect").disabled = true;
    document.getElementById("connect").textContent = "接続済み";

    puzzle.addAlgLeafListener((e)=>{

        handleMove(
            e.latestAlgLeaf.toString()
        );

    });

};

</script>

</body>
</html>
