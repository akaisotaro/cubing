<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>cubing</title>

<style>

body{
    font-family:sans-serif;
    margin:20px;
    text-align:center;
}

#connect{
    width:200px;
    height:50px;
    font-size:20px;
}

#buttons{
    display:grid;
    grid-template-columns:repeat(4,80px);
    gap:10px;
    justify-content:center;
    margin-top:30px;
}

#current{
    margin-top:40px;
    font-size:70px;
    font-weight:bold;
    color:#0066cc;
}

button{
    height:60px;
    font-size:24px;
    position:relative;
}

.note{
    position:absolute;
    right:5px;
    bottom:3px;
    font-size:11px;
    color:#666;
    pointer-events:none;
}

#preset{
    display:block;
    margin:15px auto 0;
    width:200px;
    height:40px;
    font-size:18px;
}

</style>

</head>

<body>

<h1> </h1>

<button id="connect">
接続
</button>

<select id="preset">
    <option value="preset1">preset1</option>
    <option value="preset2">preset2</option>
    <option value="preset3">preset3</option>
</select>

<div id="buttons"></div>

<div id="current">
-
</div>


<script type="module" src="./main.js"></script>

</body>
</html>
